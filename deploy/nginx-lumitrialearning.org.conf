# Install to /etc/nginx/sites-available/lumitrialearning.org
# then: ln -sf /etc/nginx/sites-available/lumitrialearning.org /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx
# certbot --nginx -d lumitrialearning.org -d www.lumitrialearning.org

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name lumitrialearning.org www.lumitrialearning.org;

    root /var/www/lumitrialearning/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
